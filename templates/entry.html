<!DOCTYPE html>
<html>
<head>
    <title>Entry</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>🚗 ParkManager</h2>
        <a href="/">Dashboard</a>
        <a href="/entry">Vehicle Entry</a>
        <a href="/exit">Vehicle Exit</a>
        <a href="/view">View Records</a>
        <a href="/logout">Logout</a>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- 🔥 TOPBAR -->
        <div class="topbar">
            <span class="menu-btn" onclick="toggleSidebar()">☰</span>
            <span>Vehicle Entry</span>
        </div>

        <div class="container">

            <div class="card">

                <h2 style="text-align:center;">Vehicle Entry</h2>

                <!-- ✅ ONLY ONE FORM -->
                <form method="POST" class="form-box">

                    <input type="text" name="vehicle_no"
                           placeholder="Enter Vehicle No (UP12AB1234)" required>

                    <select name="vehicle_type" required>
                        <option value="">Select Vehicle Type</option>
                        <option value="2">2-Wheeler</option>
                        <option value="4">4-Wheeler</option>
                    </select>

                    <button class="btn btn-blue">Register Entry</button>

                </form>

            </div>

        </div>

    </div>

</div>

<script>
function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('active');
    document.querySelector('.main').classList.toggle('shift');
}
</script>

</body>
</html>
