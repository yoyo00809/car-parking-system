<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - Park.Guard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<div class="login-wrapper">

    <div class="glass gateway-card" style="width: 100%; max-width: 450px; text-align: center; padding: 50px 40px;">
        
        <i class="fa-solid fa-radar" style="font-size: 60px; color: var(--neon-blue); filter: drop-shadow(0 0 15px var(--neon-blue-glow)); margin-bottom: 20px;"></i>
        <h2 style="font-size: 32px; letter-spacing: 2px;">Park.Guard</h2>
        <p style="color: var(--text-secondary); margin-bottom: 40px; text-transform: uppercase; font-size: 13px; letter-spacing: 1px;">Secure Access Terminal</p>

        <form method="POST">
            
            <div class="form-group" style="text-align: left;">
                <label>Operator ID</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required autocomplete="off">
            </div>

            <div class="form-group" style="text-align: left;">
                <label>Clearance Code</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary" style="margin-top: 10px;">
                <i class="fa-solid fa-unlock-keyhole"></i> Authenticate
            </button>

        </form>

        <div style="margin-top: 30px; font-size: 12px; color: var(--text-secondary); border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
            DEMO ACCESS: admin / 1234
        </div>

    </div>

</div>

</body>
</html>
