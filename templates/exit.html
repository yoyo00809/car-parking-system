<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway Exit - Park.Guard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <a href="/" class="nav-brand">
        <i class="fa-solid fa-radar"></i>
        <h2>Park.Guard</h2>
    </a>
    
    <div class="nav-menu">
        <a href="/" class="nav-pill"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a href="/entry" class="nav-pill"><i class="fa-solid fa-right-to-bracket"></i> Entry</a>
        <a href="/exit" class="nav-pill active"><i class="fa-solid fa-right-from-bracket"></i> Exit</a>
        <a href="/view" class="nav-pill"><i class="fa-solid fa-database"></i> Records</a>
    </div>
</nav>

<div class="main-wrapper">
    
    <div class="glass gateway-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <i class="fa-solid fa-barcode" style="font-size: 50px; color: var(--neon-pink); filter: drop-shadow(0 0 10px var(--neon-red-glow)); margin-bottom: 20px;"></i>
            <h2 style="font-size: 28px;">Exit Protocol</h2>
            <p style="color: var(--text-secondary); margin-top: 5px;">Scan identifier for checkout sequence</p>
        </div>

        <form method="POST" action="/exit">
            <div class="form-group">
                <label>Target Identifier</label>
                <input type="text" name="vehicle_no" class="form-control" placeholder="e.g. MH12AB1234" required style="text-transform: uppercase;">
                <i class="fa-solid fa-magnifying-glass" style="position: absolute; right: 20px; top: 40px; color: var(--text-secondary);"></i>
            </div>

            <button type="submit" class="btn btn-danger" style="margin-top: 15px;">
                <i class="fa-solid fa-file-invoice"></i> Initialize Checkout
            </button>
        </form>
    </div>

</div>

</body>
</html>
