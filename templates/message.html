<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Notice - Park.Guard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
    <a href="/" class="nav-brand">
        <i class="fa-solid fa-radar"></i>
        <h2>Park.Guard</h2>
    </a>
</nav>

<div class="main-wrapper">
    
    <div class="glass gateway-card" style="text-align: center; max-width: 450px;">
        
        {% if status == 'success' %}
            <i class="fa-solid fa-shield-check" style="font-size: 60px; color: var(--neon-green); filter: drop-shadow(0 0 15px var(--neon-green-glow)); margin-bottom: 20px;"></i>
            <h2 style="font-size: 24px; color: var(--neon-green);">Operation Verified</h2>
        {% else %}
            <i class="fa-solid fa-triangle-exclamation" style="font-size: 60px; color: var(--neon-red); filter: drop-shadow(0 0 15px var(--neon-red-glow)); margin-bottom: 20px;"></i>
            <h2 style="font-size: 24px; color: var(--neon-red);">Authorization Failed</h2>
        {% endif %}
        
        <p style="font-size: 16px; margin: 20px 0 30px 0; color: var(--text-primary);">{{ message }}</p>

        <a href="/" class="btn btn-primary"><i class="fa-solid fa-arrow-left"></i> Return to Dashboard</a>
        
    </div>

</div>

</body>
</html>
